<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASTRONIFTY ENGINE</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    color: #e0e0e0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card {
    width: 420px;
    max-width: 95vw;
    background: #161616;
    border: 1px solid #2a2a2a;
    border-radius: 8px;
    overflow: hidden;
  }
  .header {
    background: #111;
    border-bottom: 1px solid #2a2a2a;
    padding: 28px 32px 24px;
    text-align: center;
  }
  .logo {
    font-family: 'Courier New', monospace;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 3px;
    color: #00e5ff;
  }
  .sub {
    display: block;
    font-size: 10px;
    letter-spacing: 4px;
    color: #555;
    font-weight: 400;
    margin-top: 8px;
  }
  .subtitle {
    font-size: 12px;
    color: #888;
    margin-top: 4px;
    font-family: 'Courier New', monospace;
  }
  .body { padding: 28px 32px 32px; }
  .form-group { margin-bottom: 18px; }
  .label {
    display: block;
    font-family: 'Courier New', monospace;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #888;
    margin-bottom: 6px;
  }
  .input {
    width: 100%;
    padding: 12px 14px;
    background: #0a0a0a;
    border: 1px solid #2a2a2a;
    border-radius: 4px;
    color: #e0e0e0;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    outline: none;
  }
  .input:focus {
    border-color: #00e5ff;
  }
  .input::placeholder { color: #555; font-size: 12px; }
  .btn {
    width: 100%;
    padding: 14px 20px;
    border: none;
    border-radius: 4px;
    font-family: 'Courier New', monospace;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    cursor: pointer;
    background: linear-gradient(135deg, #00e5ff, #2979ff);
    color: #000;
    margin-top: 8px;
  }
  .btn:hover { opacity: 0.9; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .msg {
    padding: 10px 14px;
    border-radius: 4px;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    margin-bottom: 16px;
    display: none;
  }
  .msg.show { display: block; }
  .msg.error { background: rgba(255,23,68,0.1); border: 1px solid rgba(255,23,68,0.3); color: #ff1744; }
  .msg.success { background: rgba(0,200,83,0.1); border: 1px solid rgba(0,200,83,0.3); color: #00c853; }
  .msg.info { background: rgba(0,229,255,0.1); border: 1px solid rgba(0,229,255,0.3); color: #00e5ff; }
  .footer {
    padding: 14px 32px;
    background: #111;
    border-top: 1px solid #2a2a2a;
    text-align: center;
    font-family: 'Courier New', monospace;
    font-size: 10px;
    color: #555;
  }
  .footer a { color: #00e5ff; text-decoration: none; }
  .traders {
    margin-top: 12px;
    text-align: center;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    color: #555;
  }
  .traders .count { color: #00e5ff; font-weight: 700; font-size: 14px; }
</style>
</head>
<body>

<div class="card">
  <div class="header">
    <div class="logo">
      ASTRONIFTY ENGINE
      <span class="sub">ASTROTRADE BY KANISHK ARORA</span>
    </div>
    <div class="subtitle">Zerodha Kite Connect</div>
  </div>

  <div class="body">
    <div class="msg" id="msg"></div>

    <div class="form-group">
      <label class="label" for="apiKey">API Key</label>
      <input type="text" id="apiKey" class="input" placeholder="Enter your Kite API Key" autocomplete="off" spellcheck="false">
    </div>

    <div class="form-group">
      <label class="label" for="apiSecret">API Secret</label>
      <input type="password" id="apiSecret" class="input" placeholder="Enter your Kite API Secret" autocomplete="off" spellcheck="false">
    </div>

    <button class="btn" id="btnConnect" onclick="connect()">Connect to Zerodha</button>

    <div class="traders"><span class="count" id="cnt">--</span> active traders online</div>
  </div>

  <div class="footer">
    Set redirect URL in <a href="https://developers.kite.trade" target="_blank">Kite Developer App</a>
  </div>
</div>

<script>
var msg = document.getElementById('msg');
var btn = document.getElementById('btnConnect');
var loading = false;

// Check URL params
var p = new URLSearchParams(window.location.search);
if (p.get('auth') === 'success') {
  show('Connected! Redirecting...', 'success');
  setTimeout(function(){ window.location.href = '/'; }, 1500);
}
if (p.get('error')) {
  show('Login failed: ' + (p.get('detail') || p.get('error')), 'error');
}

// Check if already logged in
fetch('/api/auth/status').then(function(r){ return r.json(); }).then(function(d){
  if (d.authenticated) {
    show('Already connected. Redirecting...', 'success');
    setTimeout(function(){ window.location.href = '/'; }, 1500);
  }
}).catch(function(){});

// Active traders count
fetch('/api/admin/users').then(function(r){ return r.json(); }).then(function(d){
  document.getElementById('cnt').textContent = d.active_users || 0;
}).catch(function(){
  document.getElementById('cnt').textContent = '0';
});

function connect() {
  if (loading) return;
  var key = document.getElementById('apiKey').value.trim();
  var secret = document.getElementById('apiSecret').value.trim();
  if (!key || !secret) { show('Enter both API Key and Secret', 'error'); return; }

  loading = true;
  btn.disabled = true;
  btn.textContent = 'CONNECTING...';
  hide();

  fetch('/api/auth/save-credentials', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({api_key: key, api_secret: secret})
  }).then(function(r){ return r.json().then(function(d){ return {ok: r.ok, data: d}; }); })
  .then(function(res){
    if (!res.ok) throw new Error(res.data.detail || 'Failed');
    if (res.data.login_url) {
      show('Redirecting to Zerodha...', 'success');
      setTimeout(function(){ window.location.href = res.data.login_url; }, 500);
    } else {
      throw new Error('No login URL');
    }
  }).catch(function(e){
    show(e.message, 'error');
    loading = false;
    btn.disabled = false;
    btn.textContent = 'CONNECT TO ZERODHA';
  });
}

function show(t, type) { msg.textContent = t; msg.className = 'msg show ' + type; }
function hide() { msg.className = 'msg'; }

document.getElementById('apiSecret').addEventListener('keydown', function(e){
  if (e.key === 'Enter') connect();
});
document.getElementById('apiKey').addEventListener('keydown', function(e){
  if (e.key === 'Enter') document.getElementById('apiSecret').focus();
});
</script>
</body>
</html>
